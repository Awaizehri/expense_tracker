<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
     <header id="header">
        <div class="header-division">
            <a href="" class="site-logo">Ledger</a>
            <nav class="nav-bar">
                <div class="navbar-division">
                    <ul class="pages-list">
                        <li class="other-pages"><a href=""class="">Home</a></li>
                        <li><a href="" class="access-link">LogIn</a></li>
                        <li><a href=""class="access-link">Sign Up</a></li>
                    </ul>                    
                </div>
            </nav>
        </div>
    </header>
    <main id="main-content">
        <div class="form-division">
            <h1>Log In.</h1>
            <form action="">
                <div class="form-group">
                    <label for="login-email">Email:</label>
                    <input type="email" id="login-email" name="user_email">
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="user_password">
                </div>
                <div class="signin-page-buttons">
                    <button type="submit" class="submit-btn">SignIn</button>
                    <button type="reset-btn" class="reset-btn">Reset</button>
                </div>
            </form>
        </div>
    </main>
     <footer>
        <div>
            <ul>
                <li>&copy;<span id="current-year"></span> Ledger</li>
                <li><a href="">Terms</a></li>
                <li><a href="">Privacy</a></li>
                <li><a href="">Cookies</a></li>
            </ul>
        </div>
    </footer>
    <script>document.getElementById("current-year").textContent = new Date().getFullYear();</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ledger|Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header id="header">
        <div class="header-division">
            <a href="" class="site-logo">Ledger</a>
            <nav class="nav-bar">
                <div class="navbar-division">
                    <ul class="pages-list">
                        <li><a href="index.html">Home</a></li>
                        <li><a href="dashboard.html">Dashboard</a></li>
                        <li><a href="add-transaction.html">Add Transaction</a></li>
                        <li><a href="transactions.html">Transactions</a></li>
                        <li><a href="login.html">Logout</a></li>
                    </ul>                 
                </div>
            </nav>
        </div>
    </header>
    <main id="main-content">
        <section class="welcome-banner">
            <h1>Welcome Back, User!</h1>
            <p>
                Here is what your finances look like today.
            </p>
        </section>
        <section class="account-overview">
            <h2>Account overview.</h2>
            <div class="dashboard-stats-grid">
                <article class="stat-card">
                    <h3>Total Income.</h3>
                    <p class="positive-amount income-text">5000.00</p>
                </article>
                <article class="stat-card">
                    <h3>Total Expense.</h3>
                    <p class="positive-amount expense-text">5000.00</p>
                </article>
                <article class="stat-card">
                    <h3>Total Income.</h3>
                    <p class="positive-amount total-text">5000.00</p>
                </article>
            </div>
        </section>
    </main>

     <footer>
        <div>
            <ul>
                <li>&copy;<span id="current-year"></span> Ledger</li>
                <li><a href="">Terms</a></li>
                <li><a href="">Privacy</a></li>
                <li><a href="">Cookies</a></li>
            </ul>
        </div>
    </footer>
    <script>document.getElementById("current-year").textContent = new Date().getFullYear();</script>
</body>
</html>
